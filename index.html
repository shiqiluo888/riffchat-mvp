<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RiffChat - 发现新音乐队友</title>
  <style>
    body { margin: 0; background: #0a0a0a; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .container { text-align: center; padding: 20px; }
    h1 { font-size: 3rem; margin-bottom: 10px; color: #ff4d4d; }
    p { color: #888; margin-bottom: 30px; }
    .match-card { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 280px; }
    #status { margin-bottom: 20px; font-size: 16px; color: #4caf50; min-height: 48px; line-height: 1.4; }
    .btn-start { background: linear-gradient(45deg, #ff4d4d, #f9cb28); border: none; padding: 15px 40px; color: white; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; }
    .btn-start:disabled { background: #444; opacity: 0.7; }
    .loader { border: 4px solid #333; border-top: 4px solid #ff4d4d; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
  <div class="container">
    <h1>RiffChat</h1>
    <p>实时音乐视频交互</p>
    <div class="match-card">
      <div id="status">准备好开始了吗？</div>
      <div id="loader" class="loader"></div>
      <button id="startBtn" class="btn-start" onclick="startMatching()">开始匹配</button>
    </div>
  </div>

  <script>
    // 强制解决移动端 BFCache 问题
    window.onpageshow = (e) => { if (e.persisted) window.location.reload(); };

    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.onload = () => {
      if (new URLSearchParams(window.location.search).get('auto') === 'true') startMatching();
    };

    async function startMatching() {
      const btn = document.getElementById('startBtn');
      const statusText = document.getElementById('status');
      const loader = document.getElementById('loader');
      btn.disabled = true;
      loader.style.display = "block";
      statusText.innerText = "正在寻找队友...";

      try {
        const snapshot = await db.ref('rooms').once('value');
        let targetId = null;
        snapshot.forEach(child => { if (child.val().status === 'waiting') { targetId = child.key; return true; } });

        if (targetId) {
          await db.ref(`rooms/${targetId}`).update({ status: 'chatting' });
          statusText.innerText = "匹配成功，连接中...";
          setTimeout(() => window.location.replace(`chat.html?room=${targetId}`), 300);
        } else {
          const newRef = db.ref('rooms').push();
          await newRef.set({ status: "waiting", createdAt: firebase.database.ServerValue.TIMESTAMP });
          newRef.onDisconnect().remove();
          const statusRef = db.ref(`rooms/${newRef.key}/status`);
          statusRef.on('value', (snap) => {
            if (snap.val() === 'chatting') {
              statusRef.off();
              statusText.innerText = "队友已就位...";
              setTimeout(() => window.location.replace(`chat.html?room=${newRef.key}`), 300);
            }
          });
        }
      } catch (e) {
        statusText.innerText = "连接失败，请刷新";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
