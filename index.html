<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RiffChat - 发现新音乐队友</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container { text-align: center; padding: 20px; }
    h1 { font-size: 3rem; margin-bottom: 10px; color: #ff4d4d; }
    p { color: #888; margin-bottom: 30px; }
    
    .match-card {
      background: #1a1a1a;
      padding: 40px;
      border-radius: 20px;
      border: 1px solid #333;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #status { margin-bottom: 20px; font-size: 18px; color: #4caf50; min-height: 24px; }

    .btn-start {
      background: linear-gradient(45deg, #ff4d4d, #f9cb28);
      border: none;
      padding: 15px 40px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-start:hover { transform: scale(1.05); }
    .btn-start:disabled { background: #444; cursor: not-allowed; opacity: 0.7; }

    /* 加载动画 */
    .loader {
      border: 4px solid #333;
      border-top: 4px solid #ff4d4d;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      display: none;
      margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

  <div class="container">
    <h1>RiffChat</h1>
    <p>实时音乐同步视频交流平台</p>

    <div class="match-card">
      <div id="status">准备好开始了吗？</div>
      <div id="loader" class="loader"></div>
      <button id="startBtn" class="btn-start" onclick="startMatching()">开始匹配</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function startMatching() {
      const btn = document.getElementById('startBtn');
      const statusText = document.getElementById('status');
      const loader = document.getElementById('loader');

      btn.disabled = true;
      statusText.innerText = "正在搜寻队友...";
      loader.style.display = "block";

      try {
        // 1. 寻找状态为 "waiting" 的房间
        const snapshot = await db.ref('rooms').once('value');
        let targetRoomId = null;

        snapshot.forEach(child => {
          if (child.val().status === 'waiting') {
            targetRoomId = child.key;
            return true; // 找到一个就立刻跳出循环
          }
        });

        if (targetRoomId) {
          // 2. 找到了！我是第二个人。把房间状态改为 "chatting"，锁死这个房间。
          await db.ref(`rooms/${targetRoomId}`).update({ status: 'chatting' });
          
          statusText.innerText = "匹配成功！正在建立连接...";
          setTimeout(() => {
            window.location.href = `chat.html?room=${targetRoomId}`;
          }, 800);

        } else {
          // 3. 没找到空房间，我是第一个人。创建一个新房间开始等。
          const newRoomRef = db.ref('rooms').push();
          const newRoomId = newRoomRef.key;
          
          await newRoomRef.set({
            status: "waiting",
            createdAt: firebase.database.ServerValue.TIMESTAMP
          });

          // 如果我等得不耐烦关掉网页了，自动把这个房间删掉，别坑下一个人
          newRoomRef.onDisconnect().remove();

          statusText.innerText = "正在等待有缘人加入...";
          
          // 4. 监听我自己的房间状态，一旦有人把状态改成了 "chatting"，我也跳过去！
          const statusRef = db.ref(`rooms/${newRoomId}/status`);
          statusRef.on('value', (snap) => {
            if (snap.val() === 'chatting') {
              statusRef.off(); // 停止监听
              statusText.innerText = "匹配成功！正在建立连接...";
              
              setTimeout(() => {
                window.location.href = `chat.html?room=${newRoomId}`;
              }, 800);
            }
          });
        }
      } catch (err) {
        console.error(err);
        statusText.innerText = "网络异常，请重试";
        btn.disabled = false;
        loader.style.display = "none";
      }
    }
  </script>
</body>
</html>
