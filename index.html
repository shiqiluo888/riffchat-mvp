<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RiffChat - 发现新音乐队友</title>
  <style>
    body { margin: 0; background: #0a0a0a; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .container { text-align: center; padding: 20px; }
    h1 { font-size: 3rem; margin-bottom: 10px; color: #ff4d4d; }
    p { color: #888; margin-bottom: 10px; }
    .online-count { font-size: 14px; color: #4caf50; margin-bottom: 30px; background: rgba(76, 175, 80, 0.1); padding: 5px 15px; border-radius: 20px; display: inline-block; }
    .match-card { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 280px; position: relative; }
    #status { margin-bottom: 20px; font-size: 16px; color: #fff; min-height: 48px; line-height: 1.4; }
    .btn-start { background: linear-gradient(45deg, #ff4d4d, #f9cb28); border: none; padding: 15px 40px; color: white; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; transition: 0.3s; }
    .btn-cancel { background: #555; border: none; padding: 10px 20px; color: white; font-size: 14px; border-radius: 30px; cursor: pointer; margin-top: 15px; display: none; width: 100%; }
    .loader { border: 4px solid #333; border-top: 4px solid #ff4d4d; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
  <div class="container">
    <h1>RiffChat</h1>
    <p>实时音乐视频交互</p>
    <div class="online-count">🟢 全站实时在线: <span id="onlineNum">1</span> 人</div>
    
    <div class="match-card">
      <div id="status">准备好开始了吗？</div>
      <div id="loader" class="loader"></div>
      <button id="startBtn" class="btn-start" onclick="startMatching()">开始匹配</button>
      <button id="cancelBtn" class="btn-cancel" onclick="cancelMatching()">取消匹配</button>
    </div>
  </div>

  <script>
    window.onpageshow = (e) => { if (e.persisted) window.location.reload(); };

    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 【新增】全站在线人数追踪系统 ---
    const myPresenceRef = db.ref('presence').push();
    db.ref('.info/connected').on('value', (snap) => {
      if (snap.val() === true) {
        // 只要连上 Firebase，就在 presence 节点下占位
        myPresenceRef.set(true);
        // 关键：一旦用户断开（关闭网页、断网），Firebase 自动删除这个占位
        myPresenceRef.onDisconnect().remove();
      }
    });

    // 实时更新显示人数：直接数 presence 下有多少个占位
    db.ref('presence').on('value', (snapshot) => {
      const count = snapshot.numChildren();
      document.getElementById('onlineNum').innerText = count > 0 ? count : 1;
      console.log("实时人数更新为:", count);
    });

    let currentRoomRef = null;
    let isMatching = false;

    window.onload = () => {
      if (new URLSearchParams(window.location.search).get('auto') === 'true') startMatching();
    };

    async function startMatching() {
      if (isMatching) return;
      isMatching = true;

      document.getElementById('startBtn').style.display = "none";
      document.getElementById('cancelBtn').style.display = "block";
      document.getElementById('loader').style.display = "block";
      document.getElementById('status').innerText = "正在寻找队友...";

      try {
        const snapshot = await db.ref('rooms').once('value');
        let targetId = null;
        snapshot.forEach(child => { if (child.val().status === 'waiting') { targetId = child.key; return true; } });

        if (targetId) {
          await db.ref(`rooms/${targetId}`).update({ status: 'chatting' });
          document.getElementById('status').innerText = "匹配成功，连接中...";
          // 跳转前先把自己从 presence 里移除，避免重复计算，或由新页面重新注册
          myPresenceRef.remove().then(() => {
            window.location.replace(`chat.html?room=${targetId}`);
          });
        } else {
          currentRoomRef = db.ref('rooms').push();
          await currentRoomRef.set({ status: "waiting", createdAt: firebase.database.ServerValue.TIMESTAMP });
          currentRoomRef.onDisconnect().remove();
          
          const statusRef = db.ref(`rooms/${currentRoomRef.key}/status`);
          statusRef.on('value', (snap) => {
            if (snap.val() === 'chatting') {
              statusRef.off();
              document.getElementById('status').innerText = "队友已就位...";
              myPresenceRef.remove().then(() => {
                window.location.replace(`chat.html?room=${currentRoomRef.key}`);
              });
            }
          });
        }
      } catch (e) {
        resetUI("连接失败，请重试");
      }
    }

    function cancelMatching() {
      if (currentRoomRef) {
        currentRoomRef.remove();
        currentRoomRef = null;
      }
      resetUI("已取消匹配");
    }

    function resetUI(msg) {
      isMatching = false;
      document.getElementById('startBtn').style.display = "block";
      document.getElementById('cancelBtn').style.display = "none";
      document.getElementById('loader').style.display = "none";
      document.getElementById('status').innerText = msg;
    }
  </script>
</body>
</html>
