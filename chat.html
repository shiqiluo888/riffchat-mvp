<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiffChat 房间</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial, sans-serif; overflow:hidden; }
    #main { display:flex; height:100vh; }
    .video-box { flex:1; position:relative; background:#111; }
    video { width:100%; height:100%; object-fit:cover; }
    #local { border: 5px solid #ff4d4d; }
    #remote { border: 5px solid #4caf50; }
    #bottom-bar { 
      position:absolute; bottom:0; left:0; right:0; height:90px; 
      background:rgba(0,0,0,0.9); display:flex; align-items:center; 
      justify-content:center; gap:30px; z-index:100; 
    }
    button { 
      padding:14px 32px; font-size:17px; cursor:pointer; border:none; border-radius:10px; 
    }
    .back-btn { background:#555; color:white; }
    .end-btn { background:#e63939; color:white; }
  </style>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const app = initializeApp({
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    });

    window.db = getDatabase(app);
    window.fbSet = set;
    window.fbOnValue = onValue;
    window.fbRef = ref;

    console.log("✅ Firebase 初始化成功");
  </script>
</head>
<body>

  <div id="main">
    <!-- 左边：对方视频 -->
    <div class="video-box">
      <video id="remote" autoplay playsinline></video>
    </div>

    <!-- 右边：自己视频 -->
    <div class="video-box">
      <video id="local" autoplay playsinline muted></video>
    </div>
  </div>

  <!-- 底部栏（以后放音乐同步、聊天等功能） -->
  <div id="bottom-bar">
    <button class="back-btn" onclick="window.history.back()">← 返回匹配</button>
    <button class="end-btn" onclick="endCall()">结束通话</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    let localStream = null;
    let peer = null;
    let remotePeerId = null;

    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local').srcObject = localStream;
        console.log("本地视频开启成功");
      } catch (err) {
        alert("无法打开摄像头/麦克风: " + err.message);
      }
    }

    function endCall() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (peer) peer.destroy();
      window.history.back();
    }

    function initPeer() {
      peer = new Peer();

      peer.on('open', (id) => {
        console.log("我的 Peer ID:", id);
        // 存入 Firebase
        window.fbSet(window.fbRef(window.db, `rooms/${roomId}/peers/${id}`), {
          peerId: id,
          joined: Date.now()
        });
      });

      peer.on('call', (call) => {
        console.log("收到对方呼叫，正在应答...");
        call.answer(localStream);
        call.on('stream', (stream) => {
          document.getElementById('remote').srcObject = stream;
          console.log("✅ 成功收到对方视频流！");
        });
      });

      // 监听房间其他人
      window.fbOnValue(window.fbRef(window.db, `rooms/${roomId}/peers`), (snapshot) => {
        const peers = snapshot.val() || {};
        Object.values(peers).forEach(p => {
          if (p.peerId && p.peerId !== peer.id && !remotePeerId) {
            remotePeerId = p.peerId;
            console.log("发现对方 Peer ID:", remotePeerId);
            const call = peer.call(remotePeerId, localStream);
            call.on('stream', (stream) => {
              document.getElementById('remote').srcObject = stream;
              console.log("✅ 成功连接对方视频！");
            });
          }
        });
      });
    }

    // 启动
    startLocalVideo();
    initPeer();
  </script>
</body>
</html>
