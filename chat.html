<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiffChat 房间</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial, sans-serif; overflow:hidden; }
    #main { display:flex; height:100vh; }
    .video-box { flex:1; position:relative; background:#111; }
    video { width:100%; height:100%; object-fit:cover; background: #000; }
    #local { border: 5px solid #ff4d4d; }
    #remote { border: 5px solid #4caf50; }
    #bottom-bar { 
      position:absolute; bottom:0; left:0; right:0; height:110px; 
      background:rgba(0,0,0,0.9); display:flex; align-items:center; 
      justify-content:center; gap:12px; z-index:100; flex-wrap:wrap; 
    }
    button { 
      padding:13px 26px; font-size:16px; cursor:pointer; border:none; border-radius:10px; 
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    .refresh-btn { background:#4caf50; color:white; }
    .next-btn { background:#ff9800; color:white; }
    .end-btn { background:#e63939; color:white; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="main">
    <div class="video-box">
      <video id="remote" autoplay playsinline></video>
    </div>
    <div class="video-box">
      <video id="local" autoplay playsinline muted></video>
    </div>
  </div>

  <div id="bottom-bar">
    <button onclick="goBack()">← 返回匹配</button>
    <button class="refresh-btn" onclick="forceRefreshRemote()">🔄 刷新视频</button>
    <button class="next-btn" onclick="goNext()">下一个</button>
    <button class="end-btn" onclick="endCall()">结束通话</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');

    let localStream = null;
    let peer = null;
    let myJoinTime = Date.now(); 
    let isPlaying = false; // 播放状态锁

    // --- Firebase 配置 ---
    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. 获取本地流
    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local').srcObject = localStream;
        console.log("✅ 本地摄像头已就绪");
      } catch (err) {
        alert("请允许摄像头和麦克风权限以进行视频聊天");
        throw err;
      }
    }

    // 2. 渲染远程流（修复黑屏核心逻辑）
    function showRemoteStream(stream) {
      const remoteVideo = document.getElementById('remote');
      
      // 如果已经有流在播，且流 ID 没变，就不重复挂载
      if (remoteVideo.srcObject && remoteVideo.srcObject.id === stream.id) return;

      if (isPlaying) return; // 如果正在执行 play()，则拦截后续请求

      console.log("🎥 正在挂载视频流...");
      isPlaying = true;
      remoteVideo.srcObject = stream;
      
      remoteVideo.play()
        .then(() => {
          console.log("✅ 视频画面渲染成功！");
          isPlaying = false;
        })
        .catch((e) => {
          isPlaying = false;
          if (e.name === 'AbortError') {
            console.log("💡 播放请求被新请求覆盖，属正常握手现象");
          } else {
            console.error("❌ 播放失败:", e);
          }
        });
    }

    // 3. 初始化连线
    function initPeer() {
      peer = new Peer({
        config: {
          'iceServers': [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' }
          ]
        }
      });

      peer.on('open', (id) => {
        console.log("🔥 我的 Peer ID:", id);
        const peerRef = db.ref(`rooms/${roomId}/peers/${id}`);
        peerRef.set({ peerId: id, joined: myJoinTime });
        peerRef.onDisconnect().remove(); // 离线自动清理
      });

      // 被动接听
      peer.on('call', (call) => {
        console.log("📞 收到对方呼叫...");
        call.answer(localStream);
        call.on('stream', showRemoteStream);
      });

      // 主动呼叫
      db.ref(`rooms/${roomId}/peers`).on('child_added', (snapshot) => {
        const other = snapshot.val();
        // 只有当我比对方晚进入房间，且没在通话时，才发起呼叫
        if (other.peerId !== peer.id) {
          if (myJoinTime > other.joined) {
            console.log("👉 发现前辈，主动拨号:", other.peerId);
            const call = peer.call(other.peerId, localStream);
            call.on('stream', showRemoteStream);
          }
        }
      });

      // 对方离开处理
      db.ref(`rooms/${roomId}/peers`).on('child_removed', (snapshot) => {
        const leftUser = snapshot.val();
        if (leftUser.peerId !== peer.id) {
          console.log("👋 对方已离开");
          const remoteVideo = document.getElementById('remote');
          remoteVideo.srcObject = null;
        }
      });
    }

    // --- 交互功能 ---
    function forceRefreshRemote() {
      const remoteVideo = document.getElementById('remote');
      if (remoteVideo.srcObject) {
        remoteVideo.play().catch(() => {});
      }
    }

    function cleanup() {
      if (peer) {
        db.ref(`rooms/${roomId}/peers/${peer.id}`).remove();
        peer.destroy();
      }
      if (localStream) localStream.getTracks().forEach(t => t.stop());
    }

    function endCall() { cleanup(); window.history.back(); }
    function goNext() { cleanup(); window.location.href = "/"; }
    function goBack() { cleanup(); window.location.href = "/"; }

    // 启动顺序排好队
    async function startApp() {
      await startLocalVideo();
      initPeer();
    }

    startApp();
  </script>
</body>
</html>
