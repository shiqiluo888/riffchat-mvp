<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RiffChat 房间</title>
  <style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .video-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: #222; position: relative; }
    .video-container { position: relative; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; background: #000; }
    .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; font-size: 12px; z-index: 10; }
    
    .controls { height: 80px; background: #111; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 0 20px; }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-exit { background: #333; color: white; }
    .btn-next { background: #ff9800; color: white; }
    
    #loadingOverlay { position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 5; transition: opacity 0.5s; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

  <div class="video-grid">
    <div class="video-container">
      <div id="loadingOverlay">正在连接队友摄像头...</div>
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="label">队友</div>
    </div>
    <div class="video-container">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="label">你</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-exit" onclick="goHome()">退出大厅</button>
    <button class="btn-next" onclick="nextMatch()">下一个 ⏭️</button>
  </div>

  <script>
    // 1. 初始化 Firebase (必须在最前面)
    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 2. 在线人数追踪 (Presence)
    const myPresenceRef = db.ref('presence').push();
    myPresenceRef.set(true);
    myPresenceRef.onDisconnect().remove();

    // 3. 核心变量定义
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');
    let localStream;
    let peerConnection;
    let isOfferer = false;
    const roomRef = db.ref(`rooms/${roomId}`);
    
    const servers = { iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }] };

    // 4. 初始化视频流
    async function init() {
      if (!roomId) return goHome();
      
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        setupWebRTC();
      } catch (e) {
        alert("无法访问摄像头，请确保已授权");
        goHome();
      }
    }

    async function setupWebRTC() {
      peerConnection = new RTCPeerConnection(servers);
      
      // 添加本地流
      localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

      // 监听远程流
      peerConnection.ontrack = (event) => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
        document.getElementById('loadingOverlay').style.opacity = '0';
        setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
      };

      // 选出谁是发起者 (逻辑：房间里第一个人)
      const snap = await roomRef.once('value');
      const roomData = snap.val();
      
      // 这里的逻辑可以根据你的具体业务调整，简单处理：监听信令
      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          roomRef.child('candidates').push(event.candidate.toJSON());
        }
      };

      // 信令交互逻辑 (Offer/Answer)
      handleSignaling();
    }

    async function handleSignaling() {
      // 简单信令演示：实际项目中这里需要更严谨的 Offer/Answer 交换
      // 这里假设第一个进入房间的是 Offer 端
      roomRef.child('offer').on('value', async (snap) => {
        const data = snap.val();
        if (data && !peerConnection.currentRemoteDescription) {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          roomRef.update({ answer });
        }
      });

      roomRef.child('answer').on('value', async (snap) => {
        const data = snap.val();
        if (data && !peerConnection.currentRemoteDescription) {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
        }
      });

      roomRef.child('candidates').on('child_added', (snap) => {
        const candidate = new RTCIceCandidate(snap.val());
        peerConnection.addIceCandidate(candidate);
      });

      // 如果我是第一个，创建 Offer
      const roomSnap = await roomRef.once('value');
      if (!roomSnap.hasChild('offer')) {
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        roomRef.update({ offer });
      }
    }

    // 5. 导航与清理
    function cleanup() {
      if (localStream) localStream.getTracks().forEach(track => track.stop());
      if (peerConnection) peerConnection.close();
      if (myPresenceRef) myPresenceRef.remove();
      roomRef.off();
    }

    function goHome() {
      cleanup();
      window.location.replace('index.html');
    }

    function nextMatch() {
      cleanup();
      window.location.replace('index.html?auto=true');
    }

    // 启动
    init();

    // 异常断开处理
    roomRef.on('value', snap => {
      if (!snap.exists()) goHome();
    });
    roomRef.onDisconnect().remove();

  </script>
</body>
</html>
