<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiffChat 房间</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial, sans-serif; overflow:hidden; }
    #main { display:flex; height:100vh; }
    .video-box { flex:1; position:relative; background:#111; }
    video { width:100%; height:100%; object-fit:cover; }
    #local { border: 5px solid #ff4d4d; }
    #remote { border: 5px solid #4caf50; }
    #bottom-bar { 
      position:absolute; bottom:0; left:0; right:0; height:110px; 
      background:rgba(0,0,0,0.9); display:flex; align-items:center; 
      justify-content:center; gap:12px; z-index:100; flex-wrap:wrap; 
    }
    button { 
      padding:13px 26px; font-size:16px; cursor:pointer; border:none; border-radius:10px; 
    }
    .refresh-btn { background:#4caf50; color:white; }
    .next-btn { background:#ff9800; color:white; }
    .end-btn { background:#e63939; color:white; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="main">
    <div class="video-box">
      <video id="remote" autoplay playsinline></video>
    </div>
    <div class="video-box">
      <video id="local" autoplay playsinline muted></video>
    </div>
  </div>

  <div id="bottom-bar">
    <button onclick="goBack()">← 返回匹配</button>
    <button class="refresh-btn" onclick="forceRefreshRemote()">🔄 刷新视频</button>
    <button class="next-btn" onclick="goNext()">下一个</button>
    <button class="end-btn" onclick="endCall()">结束通话</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');

    let localStream = null;
    let peer = null;
    let myJoinTime = Date.now(); // 记录我加入的时间，用于防冲突

    // --- Firebase 初始化 ---
    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. 获取本地视频
    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local').srcObject = localStream;
        console.log("✅ 本地摄像头已开启");
      } catch (err) {
        alert("无法打开摄像头/麦克风，请检查浏览器权限: " + err.message);
        throw err; // 如果没有权限，中断后续执行
      }
    }

    // 播放远程视频的辅助函数
    function showRemoteStream(stream) {
      stopRemoteStream();
      const remoteVideo = document.getElementById('remote');
      remoteVideo.srcObject = stream;
      remoteVideo.play().catch((e) => console.log("播放被拦截，需要用户交互:", e));
      console.log("✅ 成功显示对方视频！");
    }

    function stopRemoteStream() {
      const remoteVideo = document.getElementById('remote');
      if (remoteVideo.srcObject) {
        remoteVideo.srcObject.getTracks().forEach(track => track.stop());
        remoteVideo.srcObject = null;
      }
    }

    // 2. 初始化 Peer
    function initPeer() {
      peer = new Peer({
        config: {
          'iceServers': [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' }
          ]
        }
      });

      peer.on('open', (id) => {
        console.log("🔥 我的 Peer ID:", id);
        const peerRef = db.ref(`rooms/${roomId}/peers/${id}`);
        
        // 写入我的信息
        peerRef.set({ peerId: id, joined: myJoinTime });
        
        // 当我意外断开连接或关掉网页时，自动从 Firebase 删掉我的信息
        peerRef.onDisconnect().remove();
      });

      // 【被动接听】当有人打给我时
      peer.on('call', (call) => {
        console.log("📞 收到对方呼叫，接听中...");
        call.answer(localStream); // 回复我的视频流
        call.on('stream', (stream) => {
          showRemoteStream(stream);
        });
      });

      // 【主动呼叫】监听房间里的人员变动
      db.ref(`rooms/${roomId}/peers`).on('child_added', (snapshot) => {
        const otherUser = snapshot.val();
        
        if (otherUser.peerId !== peer.id) {
          console.log("👀 发现房间里有其他人:", otherUser.peerId);
          
          // 防冲突机制：只允许“后进房间”的人打给“先进房间”的人
          if (myJoinTime > otherUser.joined) {
            console.log("👉 我比对方晚进房间，由我主动发起呼叫...");
            const call = peer.call(otherUser.peerId, localStream);
            
            call.on('stream', (stream) => {
              showRemoteStream(stream);
            });
          } else {
            console.log("⏳ 对方比我晚进房间，我等对方打给我...");
          }
        }
      });

      // 监听对方离开
      db.ref(`rooms/${roomId}/peers`).on('child_removed', (snapshot) => {
        const leftUser = snapshot.val();
        if (leftUser.peerId !== peer.id) {
          console.log("❌ 对方离开了房间");
          stopRemoteStream();
        }
      });
    }

    // --- 按钮功能逻辑 ---

    function forceRefreshRemote() {
      const remoteVideo = document.getElementById('remote');
      if (remoteVideo.srcObject) {
        // 不销毁流，只重新 load 播放器
        remoteVideo.load();
        remoteVideo.play().catch(() => {});
        console.log("🔄 手动强制刷新远程视频");
      }
    }

    // 离开房间清理数据的通用函数
    function cleanupAndLeave() {
      if (peer) {
        db.ref(`rooms/${roomId}/peers/${peer.id}`).remove();
        peer.destroy();
      }
      stopRemoteStream();
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
      }
    }

    function endCall() {
      cleanupAndLeave();
      window.history.back();
    }

    function goNext() {
      cleanupAndLeave();
      window.location.href = "/";
    }

    function goBack() {
      cleanupAndLeave();
      window.location.href = "/";
    }

    // 3. 启动应用：确保流程顺序
    async function startApp() {
      await startLocalVideo(); // 第一步：等待用户允许摄像头
      initPeer();              // 第二步：摄像头就绪后，再开始寻找别人
    }

    // 执行启动
    startApp();
  </script>
</body>
</html>
