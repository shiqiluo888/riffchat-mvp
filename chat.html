<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiffChat 房间 - 测试版</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial, sans-serif; overflow:hidden; }
    #main { display:flex; height:100vh; }
    .video-box { flex:1; position:relative; background:#111; }
    video { width:100%; height:100%; object-fit:cover; }
    #local { border: 5px solid #ff4d4d; }
    #remote { border: 5px solid #4caf50; }
    #bottom-bar { 
      position:absolute; bottom:0; left:0; right:0; height:100px; 
      background:rgba(0,0,0,0.9); display:flex; align-items:center; 
      justify-content:center; gap:15px; z-index:100; flex-wrap:wrap; 
    }
    button { padding:12px 28px; font-size:16px; cursor:pointer; border:none; border-radius:10px; }
    .next-btn { background:#ff9800; color:white; }
    .end-btn { background:#e63939; color:white; }
  </style>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="main">
    <div class="video-box">
      <video id="remote" autoplay playsinline></video>
    </div>
    <div class="video-box">
      <video id="local" autoplay playsinline muted></video>
    </div>
  </div>

  <div id="bottom-bar">
    <button onclick="window.history.back()">← 返回匹配</button>
    <button class="next-btn" onclick="goNext()">下一个</button>
    <button class="end-btn" onclick="endCall()">结束通话</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    let localStream = null;
    let peer = null;

    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local').srcObject = localStream;
        console.log("本地视频开启成功");
      } catch (err) {
        alert("无法打开摄像头/麦克风: " + err.message);
      }
    }

    function endCall() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (peer) peer.destroy();
      window.history.back();
    }

    function goNext() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (peer) peer.destroy();
      window.location.href = "/";
    }

    // 极简 PeerJS 连接测试版
    async function initPeer() {
      peer = new Peer();

      peer.on('open', (id) => {
        console.log("我的 Peer ID:", id);
        alert("你的 Peer ID 是: " + id + "\n请把这个 ID 发给对方，让对方手动输入连接");
      });

      peer.on('call', (call) => {
        console.log("收到对方呼叫");
        call.answer(localStream);
        call.on('stream', (stream) => {
          document.getElementById('remote').srcObject = stream;
          console.log("✅ 成功收到对方视频流！");
        });
      });

      // 手动输入对方 Peer ID（临时测试用）
      setTimeout(() => {
        const otherId = prompt("请输入对方的 Peer ID（对方控制台会显示）:");
        if (otherId && localStream) {
          console.log("正在呼叫对方:", otherId);
          const call = peer.call(otherId, localStream);
          call.on('stream', (stream) => {
            document.getElementById('remote').srcObject = stream;
            console.log("✅ 成功连接对方视频！");
          });
        }
      }, 1500);
    }

    startLocalVideo();
    initPeer();
  </script>
</body>
</html>
