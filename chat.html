<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>RiffChat - 多语言共享视听</title>
  <style>
    html, body { 
      margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial; 
      overflow: hidden; width: 100%; height: 100dvh; position: fixed; 
      display: flex; flex-direction: column; 
    }
    
    /* 顶部栏：包含语言选择和播放控制 */
    #top-header {
      background: #1a1a1a; padding: 10px; border-bottom: 2px solid #333; z-index: 20;
      display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative;
    }
    
    /* 游戏风格语言切换器 */
    .lang-selector { position: absolute; top: 10px; right: 10px; }
    #lang-select { background: #444; color: white; border: 1px solid #ff9800; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }

    .yt-controls { display: flex; gap: 8px; width: 100%; max-width: 800px; height: 36px; }
    .yt-controls input { flex: 1; padding: 0 10px; border-radius: 6px; border: none; font-size: 13px; background: #333; color: white; outline: none; }
    .yt-controls button { background: #ff0000; padding: 0 12px; border-radius: 6px; color: white; font-weight: bold; border: none; cursor: pointer; font-size: 13px; }

    #player-wrapper { width: 100%; max-width: 800px; height: 140px; background: #000; border-radius: 8px; overflow: hidden; position: relative; flex-shrink: 0; }

    /* 主内容区 */
    #main-content { flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }
    @media (min-width: 600px) { #main-content { flex-direction: row; } }

    /* 视频区 */
    #video-container { flex: 1.5; display: flex; flex-direction: column; background: #000; }
    .video-box { flex: 1; position: relative; border: 1px solid #222; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    #remote-status { position: absolute; z-index: 10; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 8px; font-size: 12px; text-align: center; color: #ff9800; }

    /* 聊天区 */
    #chat-section { flex: 1; display: flex; flex-direction: column; background: #111; border-left: 1px solid #333; max-height: 35vh; }
    @media (min-width: 600px) { #chat-section { max-height: none; } }

    #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; display: flex; flex-direction: column; gap: 8px; }
    .msg { background: #222; padding: 8px 12px; border-radius: 12px; max-width: 85%; align-self: flex-start; line-height: 1.4; }
    .msg.mine { background: #007bff; align-self: flex-end; }
    .translation-label { font-size: 10px; color: #ff9800; margin-top: 4px; display: block; border-top: 1px solid #444; padding-top: 2px; }

    #chat-input-area { padding: 10px; background: #1a1a1a; display: flex; gap: 8px; border-top: 1px solid #333; }
    #chat-input { flex: 1; background: #333; border: none; padding: 8px 15px; border-radius: 20px; color: white; outline: none; }
    #send-btn { background: #28a745; border: none; padding: 0 15px; border-radius: 20px; color: white; cursor: pointer; font-weight: bold; }

    /* 底部按钮 */
    #bottom-bar { 
      height: 65px; flex-shrink: 0; background: #000; display: flex; 
      align-items: center; justify-content: center; gap: 15px; border-top: 1px solid #333;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .btn { padding: 12px 24px; font-size: 14px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
    .next-btn { background: #ff9800; }
    .back-btn { background: #444; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="top-header">
    <div class="lang-selector">
      <select id="lang-select" onchange="changeLanguage()">
        <option value="zh">简体中文</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="kr">한국어</option>
        <option value="ru">Русский</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
      </select>
    </div>
    
    <div class="yt-controls">
      <input type="text" id="yt-url" placeholder="YouTube Link..." />
      <button onclick="shareVideo()" id="ui-share">同步播放</button>
    </div>
    
    <div id="player-wrapper">
      <div id="ytplayer"></div>
    </div>
  </div>

  <div id="main-content">
    <div id="video-container">
      <div class="video-box">
        <div id="remote-status">Connecting...</div>
        <video id="remote" autoplay playsinline webkit-playsinline></video>
      </div>
      <div class="video-box" style="flex: 0.3;">
        <video id="local" autoplay playsinline webkit-playsinline muted></video>
      </div>
    </div>

    <div id="chat-section">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Aa..." onkeydown="if(event.keyCode==13) sendMessage()"/>
        <button id="send-btn" onclick="sendMessage()">OK</button>
      </div>
    </div>
  </div>

  <div id="bottom-bar">
    <button class="btn back-btn" onclick="goHome()" id="ui-exit">退出</button>
    <button class="btn next-btn" onclick="goNext()" id="ui-next">下一个 ⏭</button>
  </div>

  <script>
    // --- 1. 多语言配置表 ---
    const i18n = {
      zh: { next: "下一个 ⏭", exit: "退出", share: "同步播放", status: "正在连接对方...", placeholder: "输入聊天...", send: "发送" },
      en: { next: "Next ⏭", exit: "Exit", share: "Sync Play", status: "Connecting...", placeholder: "Type here...", send: "Send" },
      jp: { next: "次へ ⏭", exit: "終了", share: "同期再生", status: "接続中...", placeholder: "入力...", send: "送信" },
      kr: { next: "다음 ⏭", exit: "나가기", share: "동기화", status: "연결 중...", placeholder: "채팅...", send: "전송" },
      ru: { next: "Далее ⏭", exit: "Выход", share: "Синхронизация", status: "Подключение...", placeholder: "Сообщение...", send: "ОК" }
    };

    function changeLanguage() {
      const lang = document.getElementById('lang-select').value;
      const dict = i18n[lang] || i18n.en;
      
      // 更新界面文本
      document.getElementById('ui-next').innerText = dict.next;
      document.getElementById('ui-exit').innerText = dict.exit;
      document.getElementById('ui-share').innerText = dict.share;
      document.getElementById('chat-input').placeholder = dict.placeholder;
      document.getElementById('send-btn').innerText = dict.send;
      if(document.getElementById('remote-status').style.display !== 'none') {
          document.getElementById('remote-status').innerText = dict.status;
      }
    }

    // --- 2. 模拟翻译接口 (接入16国语言逻辑) ---
    async function translateText(text, targetLang) {
      // 此处预留 Google Translate 接口
      // 演示逻辑：如果目标是英文且内容含中文，加个前缀
      const langNames = { zh: "中文", en: "English", jp: "日本語", kr: "한국어" };
      return `[To ${langNames[targetLang] || targetLang}]: ${text} (AI Translated)`;
    }

    // --- 3. 基础逻辑封装 (Firebase/YouTube/PeerJS) ---
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');
    let localStream = null, peer = null, myId = null;

    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      if (!input.value.trim()) return;
      db.ref(`rooms/${roomId}/chat`).push({ sender: myId, text: input.value, ts: Date.now() });
      input.value = '';
    }

    function listenChat() {
      db.ref(`rooms/${roomId}/chat`).on('child_added', async (snap) => {
        const data = snap.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${data.sender === myId ? 'mine' : ''}`;
        msgDiv.innerText = data.text;

        if (data.sender !== myId) {
          const currentLang = document.getElementById('lang-select').value;
          const translated = await translateText(data.text, currentLang);
          const transSpan = document.createElement('span');
          transSpan.className = 'translation-label';
          transSpan.innerText = translated;
          msgDiv.appendChild(transSpan);
        }

        const container = document.getElementById('chat-messages');
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
      });
    }

    // YouTube / PeerJS 核心复用
    let ytPlayer = null, isSyncing = false;
    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, null);
    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('ytplayer', { height: '100%', width: '100%', videoId: '', events: { 'onStateChange': onPlayerStateChange } });
      db.ref(`rooms/${roomId}/media`).on('value', snap => {
        const d = snap.val(); if(!d || d.sender === myId || !ytPlayer) return;
        isSyncing = true;
        if(d.videoId !== ytPlayer.getVideoData().video_id) ytPlayer.loadVideoById(d.videoId, d.time);
        if(Math.abs(ytPlayer.getCurrentTime() - d.time) > 2) ytPlayer.seekTo(d.time, true);
        d.state === 'playing' ? ytPlayer.playVideo() : ytPlayer.pauseVideo();
        setTimeout(()=> isSyncing = false, 1000);
      });
    }
    function onPlayerStateChange(e) {
      if(isSyncing || !myId) return;
      const s = e.data == 1 ? 'playing' : (e.data == 2 ? 'paused' : null);
      if(s) db.ref(`rooms/${roomId}/media`).set({ videoId: ytPlayer.getVideoData().video_id, state: s, time: ytPlayer.getCurrentTime(), sender: myId });
    }
    function shareVideo() {
      const vidId = document.getElementById('yt-url').value.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
      if(vidId) db.ref(`rooms/${roomId}/media`).set({ videoId: vidId, state: 'playing', time: 0, sender: myId });
    }

    async function start() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local').srcObject = localStream;
        peer = new Peer();
        peer.on('open', id => { 
            myId = id; 
            db.ref(`rooms/${roomId}/peers/${id}`).set({peerId: id}); 
            listenChat(); 
            changeLanguage(); // 初始化UI语言
        });
        peer.on('call', c => { c.answer(localStream); c.on('stream', s => document.getElementById('remote').srcObject = s); document.getElementById('remote-status').style.display='none'; });
        db.ref(`rooms/${roomId}/peers`).on('child_added', snap => {
          const o = snap.val();
          if(o.peerId !== myId && myId > o.peerId) {
            const c = peer.call(o.peerId, localStream);
            c.on('stream', s => document.getElementById('remote').srcObject = s);
            document.getElementById('remote-status').style.display='none';
          }
        });
      } catch(e) { alert("Camera Error"); }
    }
    function goNext() { cleanup(); window.location.replace("index.html?auto=true"); }
    function goHome() { cleanup(); window.location.replace("index.html"); }
    function cleanup() { if(peer) peer.destroy(); if(localStream) localStream.getTracks().forEach(t=>t.stop()); }

    start();
  </script>
</body>
</html>
