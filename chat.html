<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>RiffChat 房间 - 多语言共享视听</title>
  <style>
    /* --- 核心基础 UI (保留了你的手机端完美适配) --- */
    html, body { 
      margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial; 
      overflow: hidden; width: 100%; height: 100%; height: 100dvh; 
      position: fixed; top: 0; left: 0; display: flex; flex-direction: column; 
    }
    
    /* 顶部：共享媒体播放区 + 语言切换 */
    #media-section { 
      height: 30vh; min-height: 180px; flex-shrink: 0; background: #1a1a1a; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      padding: 10px; box-sizing: border-box; border-bottom: 2px solid #333; z-index: 10; position: relative;
    }

    /* 新增：游戏风格语言切换器 */
    .lang-selector { position: absolute; top: 10px; right: 10px; z-index: 20; }
    #lang-select { background: #444; color: white; border: 1px solid #ff9800; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; outline: none; }

    .yt-controls { display: flex; gap: 10px; width: 100%; max-width: 800px; margin-bottom: 10px; height: 40px; flex-shrink: 0; margin-top: 15px;}
    .yt-controls input { flex: 1; padding: 0 10px; border-radius: 6px; border: none; font-size: 14px; background: #333; color: white; outline: none; }
    .yt-controls button { background: #ff0000; padding: 0 15px; border-radius: 6px; color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; white-space: nowrap; font-size: 14px; }
    #player-wrapper { width: 100%; max-width: 800px; flex: 1; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
    #player-placeholder { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#555; pointer-events:none; font-size: 14px;}

    /* 中部包裹区：视频 + 聊天 */
    #main-content { flex: 1; min-height: 0; display: flex; flex-direction: column; position: relative; }
    @media (min-width: 600px) { #main-content { flex-direction: row; } }

    /* 视频通话区 */
    #camera-section { flex: 1.2; display:flex; flex-direction: column; position: relative; background: #000; }
    .video-box { flex:1; position:relative; background:#111; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
    video { width:100%; height:100%; object-fit:cover; background: #000; pointer-events: none; }
    #remote-status { position: absolute; z-index: 10; background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 10px; text-align: center; font-size: 14px; font-weight: bold; }
    
    /* 新增：聊天与翻译区 */
    #chat-section { flex: 1; display: flex; flex-direction: column; background: #111; border-left: 1px solid #333; max-height: 35vh; }
    @media (min-width: 600px) { #chat-section { max-height: none; } }
    #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; display: flex; flex-direction: column; gap: 8px; }
    .msg { background: #222; padding: 8px 12px; border-radius: 12px; max-width: 85%; align-self: flex-start; line-height: 1.4; word-break: break-word;}
    .msg.mine { background: #007bff; align-self: flex-end; }
    .translation-label { font-size: 11px; color: #ff9800; margin-top: 4px; display: block; border-top: 1px dashed #555; padding-top: 4px; }
    #chat-input-area { padding: 8px; background: #1a1a1a; display: flex; gap: 8px; border-top: 1px solid #333; }
    #chat-input { flex: 1; background: #333; border: none; padding: 8px 12px; border-radius: 15px; color: white; outline: none; font-size: 13px;}
    #send-btn { background: #28a745; border: none; padding: 0 15px; border-radius: 15px; color: white; cursor: pointer; font-weight: bold; font-size: 13px;}

    /* 底部：控制台 (保留原样) */
    #bottom-bar { 
      height: 70px; flex-shrink: 0; background: rgba(0,0,0,0.9); display: flex; 
      align-items: center; justify-content: center; gap: 15px; z-index: 100; 
      border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); box-sizing: content-box;
    }
    .btn { padding:12px 20px; font-size:15px; border:none; border-radius:8px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
    .btn:hover { opacity: 0.8; }
    .next-btn { background:#ff9800; width: 120px; }
    .back-btn { background:#444; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="media-section">
    <div class="lang-selector">
      <select id="lang-select" onchange="changeLanguage()">
        <option value="zh">简体中文</option>
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="kr">한국어</option>
        <option value="ru">Русский</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
      </select>
    </div>

    <div class="yt-controls">
      <input type="text" id="yt-url" placeholder="粘贴 YouTube 链接..." />
      <button onclick="shareVideo()" id="ui-share">全屏同步</button>
    </div>
    <div id="player-wrapper">
      <div id="player-placeholder" id="ui-wait-play">等待播放...</div>
      <div id="ytplayer"></div>
    </div>
  </div>

  <div id="main-content">
    <div id="camera-section">
      <div class="video-box">
        <div id="remote-status">正在连接队友摄像头...</div>
        <video id="remote" autoplay playsinline webkit-playsinline></video>
      </div>
      <div class="video-box" style="flex: 0.4;">
        <video id="local" autoplay playsinline webkit-playsinline muted></video>
      </div>
    </div>

    <div id="chat-section">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="输入聊天内容..." onkeydown="if(event.keyCode==13) sendMessage()"/>
        <button id="send-btn" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <div id="bottom-bar">
    <button class="btn back-btn" onclick="goHome()" id="ui-exit">退出大厅</button>
    <button class="btn next-btn" onclick="goNext()" id="ui-next">下一个 ⏭</button>
  </div>

  <script>
    // --- 0. 多语言字典 (i18n) ---
    const i18n = {
      zh: { next: "下一个 ⏭", exit: "退出大厅", share: "全屏同步", status: "正在连接队友摄像头...", placeholder: "输入聊天内容...", send: "发送", waitPlay: "等待播放..." },
      en: { next: "Next ⏭", exit: "Exit Room", share: "Sync Play", status: "Connecting to peer...", placeholder: "Type a message...", send: "Send", waitPlay: "Waiting for video..." },
      jp: { next: "次へ ⏭", exit: "退出する", share: "同期再生", status: "接続中...", placeholder: "メッセージを入力...", send: "送信", waitPlay: "再生待ち..." },
      kr: { next: "다음 ⏭", exit: "나가기", share: "동기화", status: "연결 중...", placeholder: "메시지 입력...", send: "전송", waitPlay: "재생 대기 중..." },
      ru: { next: "Далее ⏭", exit: "Выйти", share: "Синхронизация", status: "Подключение...", placeholder: "Введите сообщение...", send: "Отправить", waitPlay: "Ожидание видео..." },
      fr: { next: "Suivant ⏭", exit: "Quitter", share: "Synchroniser", status: "Connexion en cours...", placeholder: "Tapez un message...", send: "Envoyer", waitPlay: "En attente..." },
      es: { next: "Siguiente ⏭", exit: "Salir", share: "Sincronizar", status: "Conectando...", placeholder: "Escribe un mensaje...", send: "Enviar", waitPlay: "Esperando video..." }
    };

    function changeLanguage() {
      const lang = document.getElementById('lang-select').value;
      const dict = i18n[lang] || i18n.zh;
      
      document.getElementById('ui-next').innerText = dict.next;
      document.getElementById('ui-exit').innerText = dict.exit;
      document.getElementById('ui-share').innerText = dict.share;
      document.getElementById('chat-input').placeholder = dict.placeholder;
      document.getElementById('send-btn').innerText = dict.send;
      
      const statusEl = document.getElementById('remote-status');
      if(statusEl.innerText.includes("连") || statusEl.innerText.includes("Connect")) {
          statusEl.innerText = dict.status;
      }
    }

    // 模拟翻译逻辑
    async function translateText(text, targetLang) {
      const langNames = { zh: "中文", en: "English", jp: "日本語", kr: "한국어", ru: "Русский", fr: "Français", es: "Español" };
      return `[翻译至 ${langNames[targetLang]}]: ${text} (API占位)`;
    }

    // --- 基础参数 ---
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');
    let localStream = null;
    let peer = null;
    let myId = null;
    let connectTimeout = null;

    // --- 1. Firebase 初始化 ---
    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const myPresenceRef = db.ref('presence').push();
    db.ref('.info/connected').on('value', (snap) => {
      if (snap.val() === true) {
        myPresenceRef.set(true);
        myPresenceRef.onDisconnect().remove();
      }
    });

    // --- 1.5 聊天发送与接收 ---
    function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !roomId || !myId) return;
      db.ref(`rooms/${roomId}/chat`).push({ sender: myId, text: text, ts: Date.now() });
      input.value = '';
    }

    function listenChat() {
      db.ref(`rooms/${roomId}/chat`).limitToLast(30).on('child_added', async (snap) => {
        const data = snap.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${data.sender === myId ? 'mine' : ''}`;
        msgDiv.innerText = data.text;

        // 如果是对方发的消息，调用翻译
        if (data.sender !== myId) {
          const currentLang = document.getElementById('lang-select').value;
          const translated = await translateText(data.text, currentLang);
          const transSpan = document.createElement('span');
          transSpan.className = 'translation-label';
          transSpan.innerText = translated;
          msgDiv.appendChild(transSpan);
        }

        const container = document.getElementById('chat-messages');
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
      });
    }

    // --- 2. YouTube 同步播放器逻辑 ---
    let ytPlayer = null;
    let isYtReady = false;
    let isSyncing = false; 

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
      isYtReady = true;
      ytPlayer = new YT.Player('ytplayer', {
        height: '100%', width: '100%', videoId: '', 
        playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
        events: { 'onStateChange': onPlayerStateChange }
      });
      listenToMediaSync(); 
    }

    function extractVideoID(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    function shareVideo() {
      if (!isYtReady || !peer) return;
      const url = document.getElementById('yt-url').value;
      const vidId = extractVideoID(url);
      if (!vidId) return alert("解析失败 / Invalid Link");

      document.getElementById('player-placeholder').style.display = 'none';
      document.getElementById('yt-url').value = ''; 
      db.ref(`rooms/${roomId}/media`).set({ videoId: vidId, state: 'playing', time: 0, sender: myId });
    }

    function onPlayerStateChange(event) {
      if (isSyncing || !peer) return; 
      let stateStr = event.data == YT.PlayerState.PLAYING ? 'playing' : (event.data == YT.PlayerState.PAUSED ? 'paused' : null);
      if (stateStr) {
        let vidData = '';
        try { vidData = ytPlayer.getVideoData().video_id; } catch(e){}
        if (vidData) db.ref(`rooms/${roomId}/media`).set({ videoId: vidData, state: stateStr, time: ytPlayer.getCurrentTime(), sender: myId });
      }
    }

    function listenToMediaSync() {
      db.ref(`rooms/${roomId}/media`).on('value', (snap) => {
        const data = snap.val();
        if (!data || !ytPlayer || !peer || data.sender === myId) return;
        
        isSyncing = true; 
        document.getElementById('player-placeholder').style.display = 'none';

        let currentVid = '';
        try { currentVid = ytPlayer.getVideoData().video_id; } catch(e){}

        if (data.videoId && data.videoId !== currentVid) {
          ytPlayer.loadVideoById(data.videoId, data.time);
          if (data.state === 'paused') { setTimeout(() => { ytPlayer.pauseVideo(); isSyncing = false; }, 800); return; }
        } else {
          const currentTime = ytPlayer.getCurrentTime() || 0;
          if (Math.abs(currentTime - data.time) > 2) ytPlayer.seekTo(data.time, true);
          if (data.state === 'playing') ytPlayer.playVideo();
          else if (data.state === 'paused') ytPlayer.pauseVideo();
        }
        setTimeout(() => { isSyncing = false; }, 1000);
      });
    }

    // --- 3. 视频通话核心 ---
    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        document.getElementById('local').srcObject = localStream;
      } catch (err) {
        alert("请开启摄像头和麦克风 / Please allow camera access");
        goHome();
      }
    }

    function showRemoteStream(stream) {
      if (connectTimeout) clearTimeout(connectTimeout); 
      const remoteVideo = document.getElementById('remote');
      document.getElementById('remote-status').style.display = 'none';
      if (remoteVideo.srcObject && remoteVideo.srcObject.id === stream.id) return;
      remoteVideo.pause();
      remoteVideo.srcObject = stream;
      const playPromise = remoteVideo.play();
      if (playPromise !== undefined) {
        playPromise.catch(error => {
          document.getElementById('remote-status').innerText = "Click screen to play video";
          document.getElementById('remote-status').style.display = 'block';
        });
      }
    }

    document.addEventListener('click', () => {
      const rv = document.getElementById('remote');
      if (rv && rv.paused) { rv.muted = false; rv.play().catch(()=>{}); document.getElementById('remote-status').style.display = 'none'; }
    }, { once: false });

    function initPeer() {
      if (!roomId) return goHome(); 
      peer = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:global.stun.twilio.com:3478' }] } });

      peer.on('open', (id) => {
        myId = id;
        db.ref(`rooms/${roomId}/peers/${id}`).set({ peerId: id });
        db.ref(`rooms/${roomId}/peers/${id}`).onDisconnect().remove();
        
        listenChat(); // 成功连接后开启聊天监听
        
        connectTimeout = setTimeout(() => {
          const statusEl = document.getElementById('remote-status');
          if (statusEl.style.display !== 'none') statusEl.innerText = "Timeout, click Next ⏭";
        }, 12000);
      });

      peer.on('call', (call) => {
        call.answer(localStream);
        call.on('stream', showRemoteStream);
      });

      db.ref(`rooms/${roomId}/peers`).on('child_added', (snap) => {
        const other = snap.val();
        if (other.peerId !== myId && myId > other.peerId) {
          setTimeout(() => {
            const call = peer.call(other.peerId, localStream);
            call.on('stream', showRemoteStream);
          }, 1500); 
        }
      });

      db.ref(`rooms/${roomId}/peers`).on('child_removed', () => {
        document.getElementById('remote').srcObject = null;
        document.getElementById('remote-status').innerText = "Peer left, click Next ⏭";
        document.getElementById('remote-status').style.display = 'block';
      });
    }

    // --- 4. 清理与跳转 ---
    function cleanup() {
      if (connectTimeout) clearTimeout(connectTimeout);
      if (peer) { db.ref(`rooms/${roomId}/peers/${myId}`).remove(); peer.destroy(); }
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (myPresenceRef) myPresenceRef.remove();
    }
    function goNext() { cleanup(); window.location.replace("index.html?auto=true"); }
    function goHome() { cleanup(); window.location.replace("index.html"); }

    // 页面加载完成后立刻应用当前选择的语言
    changeLanguage();
    startLocalVideo().then(initPeer);
  </script>
</body>
</html>
