<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>RiffChat 房间 - 共享视听</title>
  <style>
    body { 
      margin: 0; 
      background: #000; 
      color: #fff; 
      font-family: Arial; 
      overflow: hidden; 
      height: 100vh; /* 严格限制为屏幕高度 */
      width: 100vw;
      display: flex; 
      flex-direction: column; 
    }
    
    /* 顶部：共享媒体播放区 */
    #media-section { 
      height: 35vh; /* 稍微缩小一点，给下面摄像头留点空间 */
      flex-shrink: 0; /* 核心修复：绝对不被压缩 */
      background: #1a1a1a; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      padding: 10px; 
      box-sizing: border-box;
      border-bottom: 2px solid #333; 
      z-index: 10; 
    }
    .yt-controls { display: flex; gap: 10px; width: 100%; max-width: 800px; margin-bottom: 10px; height: 40px; flex-shrink: 0; }
    .yt-controls input { flex: 1; padding: 0 10px; border-radius: 6px; border: none; font-size: 14px; background: #333; color: white; outline: none; }
    .yt-controls input::placeholder { color: #888; }
    .yt-controls button { background: #ff0000; padding: 0 20px; border-radius: 6px; color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; white-space: nowrap; }
    .yt-controls button:hover { background: #cc0000; }
    #player-wrapper { width: 100%; max-width: 800px; flex: 1; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
    #player-placeholder { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#555; pointer-events:none; }

    /* 中部：视频通话区 */
    #camera-section { 
      flex: 1; 
      min-height: 0; /* 核心修复：防止内部视频把 Flexbox 撑爆溢出屏幕 */
      display:flex; 
      flex-direction: column; 
      position: relative; 
    }
    @media (min-width: 600px) { #camera-section { flex-direction: row; } }
    .video-box { flex:1; position:relative; background:#111; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
    video { width:100%; height:100%; object-fit:cover; background: #000; pointer-events: none; }
    #remote-status { position: absolute; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 10px; text-align: center; font-size: 16px; font-weight: bold; }
    
    /* 底部：控制台 */
    #bottom-bar { 
      height: 70px; 
      flex-shrink: 0; /* 核心修复：保证底栏高度绝对锁定，永远显示 */
      background: rgba(0,0,0,0.9); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 20px; 
      z-index: 100; 
      border-top: 1px solid #333; 
    }
    .btn { padding:12px 24px; font-size:15px; border:none; border-radius:8px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
    .btn:hover { opacity: 0.8; }
    .next-btn { background:#ff9800; width: 130px; }
    .back-btn { background:#444; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="media-section">
    <div class="yt-controls">
      <input type="text" id="yt-url" placeholder="粘贴 YouTube 音乐或视频链接..." />
      <button onclick="shareVideo()">全屏同步播放</button>
    </div>
    <div id="player-wrapper">
      <div id="player-placeholder">等待播放...</div>
      <div id="ytplayer"></div>
    </div>
  </div>

  <div id="camera-section">
    <div class="video-box">
      <div id="remote-status">正在连接队友摄像头...</div>
      <video id="remote" autoplay playsinline webkit-playsinline></video>
    </div>
    <div class="video-box">
      <video id="local" autoplay playsinline webkit-playsinline muted></video>
    </div>
  </div>

  <div id="bottom-bar">
    <button class="btn back-btn" onclick="goHome()">退出大厅</button>
    <button class="btn next-btn" onclick="goNext()">下一个 ⏭</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');
    let localStream = null;
    let peer = null;
    let connectTimeout = null;

    // --- 1. Firebase 初始化与占位 ---
    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const myPresenceRef = db.ref('presence').push();
    db.ref('.info/connected').on('value', (snap) => {
      if (snap.val() === true) {
        myPresenceRef.set(true);
        myPresenceRef.onDisconnect().remove();
      }
    });

    // --- 2. YouTube 同步播放器逻辑 ---
    let ytPlayer = null;
    let isYtReady = false;
    let isSyncing = false; 

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
      isYtReady = true;
      ytPlayer = new YT.Player('ytplayer', {
        height: '100%',
        width: '100%',
        videoId: '', 
        playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
        events: { 'onStateChange': onPlayerStateChange }
      });
      listenToMediaSync(); 
    }

    function extractVideoID(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    function shareVideo() {
      if (!isYtReady || !peer) return alert("播放器或网络还在初始化，请稍等...");
      const url = document.getElementById('yt-url').value;
      const vidId = extractVideoID(url);
      if (!vidId) return alert("解析失败，请确保粘贴的是正确的 YouTube 链接！");

      document.getElementById('player-placeholder').style.display = 'none';
      document.getElementById('yt-url').value = ''; 
      
      db.ref(`rooms/${roomId}/media`).set({
        videoId: vidId,
        state: 'playing',
        time: 0,
        sender: peer.id 
      });
    }

    function onPlayerStateChange(event) {
      if (isSyncing || !peer) return; 

      let stateStr = null;
      if (event.data == YT.PlayerState.PLAYING) stateStr = 'playing';
      else if (event.data == YT.PlayerState.PAUSED) stateStr = 'paused';
      
      if (stateStr) {
        let vidData = '';
        try { vidData = ytPlayer.getVideoData().video_id; } catch(e){}
        if (!vidData) return;

        db.ref(`rooms/${roomId}/media`).set({
          videoId: vidData,
          state: stateStr,
          time: ytPlayer.getCurrentTime(),
          sender: peer.id
        });
      }
    }

    function listenToMediaSync() {
      db.ref(`rooms/${roomId}/media`).on('value', (snap) => {
        const data = snap.val();
        if (!data || !ytPlayer || !peer) return;
        
        if (data.sender === peer.id) return; 

        isSyncing = true; 
        document.getElementById('player-placeholder').style.display = 'none';

        let currentVid = '';
        try { currentVid = ytPlayer.getVideoData().video_id; } catch(e){}

        if (data.videoId && data.videoId !== currentVid) {
          ytPlayer.loadVideoById(data.videoId, data.time);
          if (data.state === 'paused') {
            setTimeout(() => { ytPlayer.pauseVideo(); isSyncing = false; }, 800);
            return;
          }
        } else {
          const currentTime = ytPlayer.getCurrentTime() || 0;
          if (Math.abs(currentTime - data.time) > 2) {
            ytPlayer.seekTo(data.time, true);
          }
          if (data.state === 'playing') ytPlayer.playVideo();
          else if (data.state === 'paused') ytPlayer.pauseVideo();
        }

        setTimeout(() => { isSyncing = false; }, 1000);
      });
    }

    // --- 3. 视频通话核心 ---
    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        document.getElementById('local').srcObject = localStream;
      } catch (err) {
        alert("请开启摄像头和麦克风权限！否则无法进行视频聊天。");
        goHome();
      }
    }

    function showRemoteStream(stream) {
      if (connectTimeout) clearTimeout(connectTimeout); 
      const remoteVideo = document.getElementById('remote');
      document.getElementById('remote-status').style.display = 'none';
      if (remoteVideo.srcObject && remoteVideo.srcObject.id === stream.id) return;
      remoteVideo.pause();
      remoteVideo.srcObject = stream;
      const playPromise = remoteVideo.play();
      if (playPromise !== undefined) {
        playPromise.catch(error => {
          document.getElementById('remote-status').innerText = "由于浏览器限制，请点击屏幕开启画面和声音";
          document.getElementById('remote-status').style.display = 'block';
        });
      }
    }

    document.addEventListener('click', () => {
      const rv = document.getElementById('remote');
      if (rv && rv.paused) {
        rv.muted = false;
        rv.play().catch(()=>{});
        document.getElementById('remote-status').style.display = 'none';
      }
    }, { once: false });

    function initPeer() {
      if (!roomId) { alert("房间号不存在！"); return goHome(); }
      peer = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:global.stun.twilio.com:3478' }] } });

      peer.on('open', (id) => {
        db.ref(`rooms/${roomId}/peers/${id}`).set({ peerId: id });
        db.ref(`rooms/${roomId}/peers/${id}`).onDisconnect().remove();
        
        connectTimeout = setTimeout(() => {
          const statusEl = document.getElementById('remote-status');
          if (statusEl.style.display !== 'none') statusEl.innerText = "连接超时，请直接点击【下一个】⏭";
        }, 12000);
      });

      peer.on('call', (call) => {
        call.answer(localStream);
        call.on('stream', showRemoteStream);
      });

      db.ref(`rooms/${roomId}/peers`).on('child_added', (snap) => {
        const other = snap.val();
        if (other.peerId !== peer.id && peer.id > other.peerId) {
          setTimeout(() => {
            const call = peer.call(other.peerId, localStream);
            call.on('stream', showRemoteStream);
          }, 1500); 
        }
      });

      db.ref(`rooms/${roomId}/peers`).on('child_removed', () => {
        document.getElementById('remote').srcObject = null;
        document.getElementById('remote-status').innerText = "对方已离开，请点下一个 ⏭";
        document.getElementById('remote-status').style.display = 'block';
      });
    }

    // --- 4. 清理与跳转 ---
    function cleanup() {
      if (connectTimeout) clearTimeout(connectTimeout);
      if (peer) { db.ref(`rooms/${roomId}/peers/${peer.id}`).remove(); peer.destroy(); }
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (myPresenceRef) myPresenceRef.remove();
    }
    function goNext() { cleanup(); window.location.replace("index.html?auto=true"); }
    function goHome() { cleanup(); window.location.replace("index.html"); }

    startLocalVideo().then(initPeer);
  </script>
</body>
</html>
