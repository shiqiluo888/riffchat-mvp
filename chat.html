<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>RiffChat 房间</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial; overflow:hidden; position: fixed; width: 100%; height: 100%; }
    #main { display:flex; flex-direction: column; height:100vh; }
    .video-box { flex:1; position:relative; background:#111; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    video { width:100%; height:100%; object-fit:cover; background: #000; pointer-events: none; }
    @media (min-width: 600px) { #main { flex-direction: row; } }
    #remote-status { position: absolute; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 10px; text-align: center; font-size: 16px; font-weight: bold; }
    #bottom-bar { position:absolute; bottom:0; width:100%; height:80px; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; gap:20px; z-index:100; }
    button { padding:12px 20px; font-size:16px; border:none; border-radius:8px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
    button:hover { opacity: 0.8; }
    .next-btn { background:#ff9800; width: 120px; }
    .back-btn { background:#444; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="main">
    <div class="video-box">
      <div id="remote-status">正在连接队友摄像头...</div>
      <video id="remote" autoplay playsinline webkit-playsinline></video>
    </div>
    <div class="video-box">
      <video id="local" autoplay playsinline webkit-playsinline muted></video>
    </div>
  </div>

  <div id="bottom-bar">
    <button class="back-btn" onclick="goHome()">退出大厅</button>
    <button class="next-btn" onclick="goNext()">下一个 ⏭</button>
  </div>

  <script>
    // 核心变量定义
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');
    let localStream = null;
    let peer = null;
    let connectTimeout = null;

    // 1. 初始化 Firebase (加上了安全保护，彻底防止"No Firebase App"报错)
    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };
    
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 2. 【新增】在线人数占位系统 (Presence)
    // 确保用户进入聊天室后，大厅的"当前在线"依然会把这个人算进去
    const myPresenceRef = db.ref('presence').push();
    db.ref('.info/connected').on('value', (snap) => {
      if (snap.val() === true) {
        myPresenceRef.set(true);
        myPresenceRef.onDisconnect().remove();
      }
    });

    // 3. 开启本地摄像头
    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
        document.getElementById('local').srcObject = localStream;
      } catch (err) {
        alert("请开启摄像头和麦克风权限！否则无法进行视频聊天。");
        goHome(); // 没权限直接退回大厅
      }
    }

    // 4. 显示远程视频流
    function showRemoteStream(stream) {
      if (connectTimeout) clearTimeout(connectTimeout); // 成功拿到流，取消超时警告
      
      const remoteVideo = document.getElementById('remote');
      document.getElementById('remote-status').style.display = 'none';
      
      if (remoteVideo.srcObject && remoteVideo.srcObject.id === stream.id) return;
      
      remoteVideo.pause();
      remoteVideo.srcObject = stream;
      
      const playPromise = remoteVideo.play();
      if (playPromise !== undefined) {
        playPromise.catch(error => {
          document.getElementById('remote-status').innerText = "由于浏览器限制，请点击屏幕任意位置开启对方画面和声音";
          document.getElementById('remote-status').style.display = 'block';
        });
      }
    }

    // 解除浏览器自动播放限制
    document.addEventListener('click', () => {
      const rv = document.getElementById('remote');
      if (rv && rv.paused) {
        rv.muted = false;
        rv.play().catch(()=>{});
        document.getElementById('remote-status').style.display = 'none';
      }
    }, { once: false });

    // 5. 初始化 PeerJS (视频连线核心)
    function initPeer() {
      if (!roomId) {
        alert("房间号不存在！");
        return goHome();
      }

      peer = new Peer({
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:global.stun.twilio.com:3478' }] }
      });

      peer.on('open', (id) => {
        db.ref(`rooms/${roomId}/peers/${id}`).set({ peerId: id });
        db.ref(`rooms/${roomId}/peers/${id}`).onDisconnect().remove();

        // 12秒没连上，大概率对方网络卡了或者退出了
        connectTimeout = setTimeout(() => {
          const statusEl = document.getElementById('remote-status');
          if (statusEl.style.display !== 'none') {
            statusEl.innerText = "连接超时，对方网络可能不佳，请直接点击【下一个】⏭";
          }
        }, 12000);
      });

      peer.on('call', (call) => {
        call.answer(localStream);
        call.on('stream', showRemoteStream);
      });

      db.ref(`rooms/${roomId}/peers`).on('child_added', (snap) => {
        const other = snap.val();
        // 核心修复：用 ID 字符串大小做绝对的判断，谁的 ID 大，谁就主动打电话
        if (other.peerId !== peer.id && peer.id > other.peerId) {
          // 延时1.5秒打电话，确保对面的 peer.on('call') 已经准备就绪
          setTimeout(() => {
            const call = peer.call(other.peerId, localStream);
            call.on('stream', showRemoteStream);
          }, 1500); 
        }
      });

      db.ref(`rooms/${roomId}/peers`).on('child_removed', () => {
        document.getElementById('remote').srcObject = null;
        document.getElementById('remote-status').innerText = "对方已断开连接，请点下一个 ⏭";
        document.getElementById('remote-status').style.display = 'block';
      });
    }

    // 6. 退出、清理与按钮逻辑
    function cleanup() {
      if (connectTimeout) clearTimeout(connectTimeout);
      if (peer) { 
        db.ref(`rooms/${roomId}/peers/${peer.id}`).remove(); 
        peer.destroy(); 
      }
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
      }
      // 退出聊天室时，清理自己的人数统计占位
      if (myPresenceRef) {
        myPresenceRef.remove();
      }
    }

    function goNext() { 
      cleanup(); 
      window.location.replace("index.html?auto=true"); 
    }
    
    function goHome() { 
      cleanup(); 
      window.location.replace("index.html"); 
    }

    // 启动流程
    startLocalVideo().then(initPeer);
  </script>
</body>
</html>
