<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiffChat 房间</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial, sans-serif; overflow:hidden; }
    #main { display:flex; height:100vh; }
    .video-box { flex:1; position:relative; background:#111; }
    video { width:100%; height:100%; object-fit:cover; }
    #local { border: 6px solid #ff4d4d; }
    #remote { border: 6px solid #4caf50; }
    #bottom-bar { 
      position:absolute; bottom:0; left:0; right:0; height:120px; 
      background:rgba(0,0,0,0.95); display:flex; align-items:center; 
      justify-content:center; gap:12px; z-index:100; flex-wrap:wrap; 
    }
    button { 
      padding:14px 28px; font-size:16px; cursor:pointer; border:none; border-radius:10px; 
    }
    .manual-btn { background:#2196F3; color:white; }
    .refresh-btn { background:#4caf50; color:white; }
  </style>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>
</head>
<body>

  <div id="main">
    <div class="video-box">
      <video id="remote" autoplay playsinline></video>
    </div>
    <div class="video-box">
      <video id="local" autoplay playsinline muted></video>
    </div>
  </div>

  <div id="bottom-bar">
    <button onclick="window.history.back()">← 返回匹配</button>
    <button class="manual-btn" onclick="manualCall()">手动输入 Peer ID</button>
    <button class="refresh-btn" onclick="refreshRemoteVideo()">刷新对方视频</button>
    <button onclick="goNext()">下一个</button>
    <button onclick="endCall()" style="background:#e63939; color:white;">结束通话</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    let localStream = null;
    let peer = null;
    let remotePeerId = null;

    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local').srcObject = localStream;
        console.log("本地视频开启成功");
      } catch (err) {
        alert("无法打开摄像头/麦克风: " + err.message);
      }
    }

    function stopRemoteStream() {
      const remoteVideo = document.getElementById('remote');
      if (remoteVideo.srcObject) {
        remoteVideo.srcObject.getTracks().forEach(track => track.stop());
        remoteVideo.srcObject = null;
      }
    }

    function refreshRemoteVideo() {
      stopRemoteStream();
      console.log("手动刷新对方视频...");
      // 强制重新请求一次
      if (remotePeerId && peer && localStream) {
        const call = peer.call(remotePeerId, localStream);
        call.on('stream', (stream) => {
          stopRemoteStream();
          document.getElementById('remote').srcObject = stream;
          console.log("✅ 刷新后成功收到对方视频流！");
        });
      }
    }

    function endCall() {
      stopRemoteStream();
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (peer) peer.destroy();
      window.history.back();
    }

    function goNext() {
      stopRemoteStream();
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (peer) peer.destroy();
      window.location.href = "/";
    }

    function manualCall() {
      const otherId = prompt("请输入对方的 Peer ID（对方控制台会显示）:");
      if (!otherId || !localStream) return;

      console.log("手动呼叫对方:", otherId);
      stopRemoteStream();

      const call = peer.call(otherId, localStream);
      call.on('stream', (stream) => {
        stopRemoteStream();
        document.getElementById('remote').srcObject = stream;
        console.log("✅ 手动连接成功！");
      });
    }

    function initPeer() {
      peer = new Peer();

      peer.on('open', (id) => {
        console.log("我的 Peer ID:", id);
      });

      peer.on('call', (call) => {
        console.log("收到对方呼叫");
        call.answer(localStream);
        call.on('stream', (stream) => {
          stopRemoteStream();
          document.getElementById('remote').srcObject = stream;
          console.log("✅ 成功收到对方视频流！");
        });
      });

      // 自动尝试
      setInterval(() => {
        if (remotePeerId) return;
        db.ref(`rooms/${roomId}/peers`).once('value', (snapshot) => {
          const peers = snapshot.val() || {};
          Object.values(peers).forEach(p => {
            if (p && p.peerId && p.peerId !== peer.id && !remotePeerId) {
              remotePeerId = p.peerId;
              console.log("自动发现对方:", remotePeerId);
              const call = peer.call(remotePeerId, localStream);
              call.on('stream', (stream) => {
                stopRemoteStream();
                document.getElementById('remote').srcObject = stream;
                console.log("✅ 自动连接成功！");
              });
            }
          });
        });
      }, 2000);
    }

    startLocalVideo();
    initPeer();
  </script>
</body>
</html>
