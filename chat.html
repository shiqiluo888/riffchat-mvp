<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiffChat 房间</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial; overflow:hidden; }
    #container { position:relative; width:100vw; height:100vh; }
    #remote { width:100%; height:100%; object-fit:cover; background:#111; }
    #local { 
      position:absolute; bottom:20px; right:20px; width:260px; height:200px; 
      border:5px solid #ff4d4d; border-radius:12px; object-fit:cover; 
      box-shadow:0 0 20px rgba(255,77,77,0.8); 
    }
    #controls { 
      position:absolute; bottom:20px; left:50%; transform:translateX(-50%); 
      background:rgba(0,0,0,0.8); padding:12px 25px; border-radius:12px; 
      display:flex; gap:15px; 
    }
    button { padding:12px 24px; font-size:16px; cursor:pointer; border:none; border-radius:8px; }
    .back-btn { background:#555; }
    .end-btn { background:#e63939; }
  </style>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const app = initializeApp({
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    });

    window.db = getDatabase(app);
    window.firebaseSet = set;
    window.firebaseOnValue = onValue;
    window.firebaseRef = ref;

    console.log("✅ Firebase 初始化成功");
  </script>
</head>
<body>

  <div id="container">
    <video id="remote" autoplay playsinline></video>
    <video id="local" autoplay playsinline muted></video>
  </div>

  <div id="controls">
    <button class="back-btn" onclick="window.history.back()">← 返回匹配</button>
    <button class="end-btn" onclick="endCall()">结束通话</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    let localStream = null;
    let peer = null;
    let remotePeerId = null;

    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local').srcObject = localStream;
        console.log("本地视频开启成功");
      } catch (err) {
        alert("无法打开摄像头/麦克风: " + err.message);
      }
    }

    function endCall() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (peer) peer.destroy();
      window.history.back();
    }

    async function initPeer() {
      peer = new Peer();

      peer.on('open', (id) => {
        console.log("我的 Peer ID:", id);
        window.firebaseSet(window.firebaseRef(window.db, `rooms/${roomId}/peers/${id}`), {
          peerId: id,
          joined: Date.now()
        });
      });

      peer.on('call', (call) => {
        console.log("收到对方呼叫，正在应答...");
        call.answer(localStream);
        call.on('stream', (stream) => {
          document.getElementById('remote').srcObject = stream;
          console.log("✅ 成功收到对方视频流！");
        });
      });

      window.firebaseOnValue(window.firebaseRef(window.db, `rooms/${roomId}/peers`), (snapshot) => {
        const peers = snapshot.val() || {};
        Object.values(peers).forEach(p => {
          if (p.peerId && p.peerId !== peer.id && !remotePeerId) {
            remotePeerId = p.peerId;
            console.log("发现对方 Peer ID:", remotePeerId);
            const call = peer.call(remotePeerId, localStream);
            call.on('stream', (stream) => {
              document.getElementById('remote').srcObject = stream;
              console.log("✅ 成功连接对方视频！");
            });
          }
        });
      });
    }

    startLocalVideo();
    initPeer();
  </script>
</body>
</html>
