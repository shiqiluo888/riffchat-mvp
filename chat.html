<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiffChat 房间</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial, sans-serif; overflow:hidden; }
    #main { display:flex; height:100vh; }
    .video-box { flex:1; position:relative; background:#111; }
    video { width:100%; height:100%; object-fit:cover; }
    #local { border: 5px solid #ff4d4d; }
    #remote { border: 5px solid #4caf50; }
    #bottom-bar { 
      position:absolute; bottom:0; left:0; right:0; height:90px; 
      background:rgba(0,0,0,0.9); display:flex; align-items:center; 
      justify-content:center; gap:15px; z-index:100; 
    }
    button { 
      padding:14px 28px; font-size:16px; cursor:pointer; border:none; border-radius:10px; 
    }
    .back-btn { background:#555; }
    .next-btn { background:#ff9800; color:white; }
    .end-btn { background:#e63939; color:white; }
  </style>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA2TSgfQ7S4dXZqENdlFegVa0eqMh5zpiY",
      authDomain: "riffchat-96b69.firebaseapp.com",
      projectId: "riffchat-96b69",
      storageBucket: "riffchat-96b69.firebasestorage.app",
      messagingSenderId: "597645980095",
      appId: "1:597645980095:web:607eefd061c062fed7710a",
      databaseURL: "https://riffchat-96b69-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>
</head>
<body>

  <div id="main">
    <div class="video-box">
      <video id="remote" autoplay playsinline></video>
    </div>
    <div class="video-box">
      <video id="local" autoplay playsinline muted></video>
    </div>
  </div>

  <div id="bottom-bar">
    <button class="back-btn" onclick="goBack()">← 返回匹配</button>
    <button class="next-btn" onclick="goNext()">下一个</button>
    <button class="end-btn" onclick="endCall()">结束通话</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    let localStream = null;
    let peer = null;
    let remotePeerId = null;

    async function startLocalVideo() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local').srcObject = localStream;
        console.log("本地视频开启成功");
      } catch (err) {
        alert("无法打开摄像头/麦克风: " + err.message);
      }
    }

    function stopAllStreams() {
      const remoteVideo = document.getElementById('remote');
      if (remoteVideo.srcObject) {
        remoteVideo.srcObject.getTracks().forEach(track => track.stop());
        remoteVideo.srcObject = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      console.log("所有视频流已停止，黑屏重置");
    }

    function endCall() {
      stopAllStreams();
      if (peer) peer.destroy();
      window.history.back();
    }

    function goBack() {
      endCall();
    }

    function goNext() {
      stopAllStreams();
      if (peer) peer.destroy();
      console.log("用户点击下一个，跳转重新匹配...");
      window.location.href = "/";
    }

    function initPeer() {
      peer = new Peer();

      peer.on('open', (id) => {
        console.log("我的 Peer ID:", id);
        db.ref(`rooms/${roomId}/peers/${id}`).set({
          peerId: id,
          joined: Date.now()
        });
      });

      peer.on('call', (call) => {
        console.log("收到对方呼叫");
        call.answer(localStream);
        call.on('stream', (stream) => {
          const remoteVideo = document.getElementById('remote');
          if (remoteVideo.srcObject) remoteVideo.srcObject.getTracks().forEach(t => t.stop());
          remoteVideo.srcObject = stream;
          console.log("✅ 成功收到对方视频流！");
        });
      });

      db.ref(`rooms/${roomId}/peers`).on('value', (snapshot) => {
        const peers = snapshot.val() || {};
        Object.values(peers).forEach(p => {
          if (p && p.peerId && p.peerId !== peer.id && !remotePeerId) {
            remotePeerId = p.peerId;
            console.log("发现对方 Peer ID:", remotePeerId);
            const call = peer.call(remotePeerId, localStream);
            call.on('stream', (stream) => {
              const remoteVideo = document.getElementById('remote');
              if (remoteVideo.srcObject) remoteVideo.srcObject.getTracks().forEach(t => t.stop());
              remoteVideo.srcObject = stream;
              console.log("✅ 成功连接对方视频！");
            });
          }
        });
      });
    }

    // 启动
    startLocalVideo();
    initPeer();
  </script>
</body>
</html>
